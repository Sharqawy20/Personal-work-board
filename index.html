<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة العمل الشخصية</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');

  :root {
    --bg: #080B22;
    --bg-card: #213164;
    --bg-card-hover: #283A75;
    --border: #34448C;
    --border-light: #4456A0;
    --text: #EDEFFA;
    --text-dim: #AEB7E6;
    --text-faint: #7884C4;
    --accent: #4A5BC2;
    --accent-strong: #213164;
    --accent-dim: #18234A;
    --status-new: #8C95D8;
    --status-progress: #D9A53C;
    --status-done: #45C19A;
    --status-new-bg: rgba(140,149,216,0.20);
    --status-progress-bg: rgba(217,165,60,0.20);
    --status-done-bg: rgba(69,193,154,0.20);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    direction: rtl;
  }

  body {
    min-height: 100vh;
    padding: 28px 20px 60px;
  }

  .wrap { max-width: 1320px; margin: 0 auto; }

  .topbar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .title-block .eyebrow {
    font-size: 12px;
    letter-spacing: 0.5px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 6px;
  }

  .title-block h1 {
    font-size: 28px;
    font-weight: 800;
    margin: 0 0 4px;
  }

  .title-block p {
    font-size: 13px;
    color: var(--text-dim);
    margin: 0;
  }

  .global-stats { display: flex; gap: 14px; }

  .stat-pill {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 18px;
    text-align: center;
    min-width: 84px;
  }

  .stat-pill .num { font-size: 20px; font-weight: 800; display: block; line-height: 1.2; }
  .stat-pill .lbl { font-size: 11px; color: var(--text-dim); }
  .stat-pill.done .num { color: var(--status-done); }
  .stat-pill.progress .num { color: var(--status-progress); }
  .stat-pill.total .num { color: var(--accent); }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  @media (max-width: 1000px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 680px) {
    .grid { grid-template-columns: 1fr; }
    .topbar { flex-direction: column; align-items: stretch; }
    .global-stats { justify-content: flex-start; }
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 18px 16px;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s ease;
  }

  .card:hover { border-color: var(--border-light); }

  .card-head {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .donut { flex-shrink: 0; width: 46px; height: 46px; }

  .card-head-text { flex: 1; min-width: 0; }

  .card-head-text h2 {
    font-size: 16px;
    font-weight: 700;
    margin: 0 0 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-head-text .meta { font-size: 11.5px; color: var(--text-dim); }

  .chevron {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    color: var(--text-faint);
    transition: transform 0.25s ease;
  }

  .card.collapsed .chevron { transform: rotate(-90deg); }

  .card-body {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card.collapsed .card-body { display: none; }

  .item-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.02);
    border: 1px solid transparent;
    transition: background 0.15s ease;
  }

  .item-row:hover { background: rgba(255,255,255,0.04); border-color: var(--border); }

  .status-dot {
    flex-shrink: 0;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    cursor: pointer;
    border: none;
    padding: 0;
  }

  .item-text {
    flex: 1;
    font-size: 13.5px;
    color: var(--text);
    background: transparent;
    border: none;
    outline: none;
    font-family: inherit;
    padding: 2px 0;
    min-width: 0;
  }

  .item-row.status-done .item-text { color: var(--text-faint); text-decoration: line-through; }

  .status-badge {
    flex-shrink: 0;
    font-size: 10.5px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    cursor: pointer;
    border: none;
    white-space: nowrap;
    font-family: inherit;
  }

  .status-badge.new { background: var(--status-new-bg); color: var(--status-new); }
  .status-badge.progress { background: var(--status-progress-bg); color: var(--status-progress); }
  .status-badge.done { background: var(--status-done-bg); color: var(--status-done); }

  .delete-btn {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border: none;
    background: transparent;
    color: var(--text-faint);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s ease, background 0.15s ease, color 0.15s ease;
  }

  .item-row:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: rgba(220,80,80,0.15); color: #E07A7A; }

  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }

  .add-row input {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    min-width: 0;
  }

  .add-row input:focus { border-color: var(--accent-dim); }
  .add-row input::placeholder { color: var(--text-faint); }

  .add-btn {
    flex-shrink: 0;
    background: var(--accent);
    color: #080B22;
    border: none;
    border-radius: 10px;
    width: 36px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: filter 0.15s ease;
  }

  .add-btn:hover { filter: brightness(1.1); }

  .empty-hint {
    font-size: 12.5px;
    color: var(--text-faint);
    text-align: center;
    padding: 14px 0;
  }

  .save-toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    color: var(--text-dim);
    font-size: 12.5px;
    padding: 8px 18px;
    border-radius: 30px;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
    z-index: 999;
  }

  .save-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .item-row.is-urgent {
    background: rgba(217,70,70,0.10);
    border-color: rgba(217,70,70,0.35);
  }

  .item-row.is-urgent:hover { background: rgba(217,70,70,0.16); }

  .urgent-btn {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border: none;
    background: transparent;
    color: var(--text-faint);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s ease, background 0.15s ease;
  }

  .urgent-btn:hover { background: rgba(217,70,70,0.15); color: #E07A7A; }
  .urgent-btn.is-urgent { color: #E25C5C; }

  .note-btn {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border: none;
    background: transparent;
    color: var(--text-faint);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s ease, background 0.15s ease;
    position: relative;
  }

  .note-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-dim); }
  .note-btn.has-note { color: var(--status-progress); }

  .note-btn.has-note::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--status-progress);
    border: 1.5px solid var(--bg-card);
  }

  .note-popover {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    z-index: 50;
    background: var(--bg-card-hover);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  }

  .note-textarea {
    width: 100%;
    min-height: 70px;
    resize: vertical;
    background: rgba(0,0,0,0.15);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    outline: none;
  }

  .note-textarea:focus { border-color: var(--accent); }
  .note-textarea::placeholder { color: var(--text-faint); }

  .note-actions {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-top: 8px;
  }

  .note-save-btn {
    background: var(--accent);
    color: #080B22;
    border: none;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }

  .note-save-btn:hover { filter: brightness(1.1); }

  .note-clear-btn {
    background: transparent;
    color: var(--text-faint);
    border: none;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    text-decoration: underline;
  }

  .note-clear-btn:hover { color: #E07A7A; }

  .reset-link {
    font-size: 11.5px;
    color: var(--text-faint);
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
  }

  .bottom-bar {
    margin-top: 24px;
    text-align: center;
    display: flex;
    justify-content: center;
    gap: 18px;
  }

  .loading-screen {
    display: block;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  #app.is-loading .loading-screen { display: block; }
  #app.is-loading .grid { display: none; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

</head>
<body>
<div class="wrap is-loading" id="app">
  <div class="topbar">
    <div class="title-block">
      <div class="eyebrow">لوحة العمل الشخصية</div>
      <h1>متابعة الأعمال والمشاريع</h1>
      <p>بياناتك متزامنة ومحفوظة سحابياً بشكل تلقائي ومباشر من أي جهاز وفي أي وقت.</p>
    </div>
    <div class="global-stats" id="globalStats"></div>
  </div>

  <div class="loading-screen" id="loadingScreen">جارِ الاتصال بقاعدة البيانات السحابية وتحميل مشاريعك...</div>

  <div class="grid" id="grid"></div>

  <div class="bottom-bar">
    <button class="reset-link" id="resetBtn">إعادة ضبط كل البيانات للوضع الافتراضي</button>
  </div>
</div>

<div class="save-toast" id="saveToast">تم الحفظ ✓</div>

<script>
const STORAGE_KEY = 'workboard_data_v1';
const STATUS_CYCLE = ['new', 'progress', 'done'];
const STATUS_LABEL = { new: 'جديد', progress: 'قيد التنفيذ', done: 'منتهي' };
const STATUS_COLOR = { new: '#8C95D8', progress: '#D9A53C', done: '#45C19A' };

// الإعدادات السحابية الافتراضية
const firebaseConfig = {
  // ⚠️ استبدل السطر التالي بالكامل بكود الـ config الخاص بك من فيربيز
  ضع_هنا_بيانات_مشروعك_من_فيربيز
};

// تهيئة فيربيز
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const DEFAULT_SECTIONS = [
  { id: 'sec_subs', title: 'اشتراكات', items: [
    { id: 'i1', text: 'Freepik', status: 'progress' },
    { id: 'i2', text: 'Adobe', status: 'progress' },
    { id: 'i3', text: 'Claude', status: 'progress' },
    { id: 'i4', text: 'Gimini', status: 'progress' },
  ]},
  { id: 'sec_admin', title: 'أعمال إدارية وتسويقية ومتابعة', items: [
    { id: 'i5', text: 'سيارة 91', status: 'new' },
    { id: 'i6', text: 'كارت حسين علي', status: 'new' },
    { id: 'i7', text: 'كتالوج العام', status: 'progress' },
  ]},
  { id: 'sec_print', title: 'طباعات', items: [] },
  { id: 'sec_insta', title: 'انستجرام', items: [
    { id: 'i8', text: 'مقاعد وأحواض كلوب هاوس', status: 'new' },
    { id: 'i9', text: 'أحواض زهور', status: 'new' },
    { id: 'i10', text: 'محطات باص', status: 'new' },
    { id: 'i11', text: 'قبة مسجد', status: 'new' },
    { id: 'i12', text: 'حواجز الطرق', status: 'new' },
    { id: 'i13', text: 'كراسي الفايبرجلاس صغيرة', status: 'new' },
    { id: 'i14', text: 'مسبح الجابرية', status: 'new' },
    { id: 'i15', text: 'برادات مياه', status: 'new' },
    { id: 'i16', text: 'مغسلة المقابر', status: 'new' },
    { id: 'i17', text: 'فنجان ومجسم فريج صويلح', status: 'new' },
    { id: 'i18', text: 'غرف فايبرجلاس', status: 'new' },
    { id: 'i19', text: 'تفاصيل طبقات بولي ايثيلين', status: 'new' },
    { id: 'i20', text: 'ألواح الفايبرجلاس', status: 'new' },
    { id: 'i21', text: 'غرفة متنقلة كبيرة فوق سطح منزل', status: 'new' },
  ]},
  { id: 'sec_design', title: 'تصميم', items: [
    { id: 'i22', text: 'كتالوج الوطنية العام', status: 'progress' },
    { id: 'i23', text: 'كتالوج دورات مياه', status: 'progress' },
    { id: 'i24', text: 'كتالوج GRP', status: 'progress' },
    { id: 'i25', text: 'كتالوج برادات السبيل', status: 'progress' },
    { id: 'i26', text: 'كتالوج الغرف المتنقلة', status: 'progress' },
    { id: 'i27', text: 'كتالوج المكيفات الصحراوية', status: 'progress' },
    { id: 'i28', text: 'لينكات كتالوجات', status: 'progress' },
    { id: 'i29', text: 'بوستات للكويتية', status: 'new' },
    { id: 'i30', text: 'بوستات ٩١', status: 'new' },
  ]},
  { id: 'sec_photo', title: 'تصوير', items: [
    { id: 'i31', text: 'حديقة العديلية', status: 'new' },
    { id: 'i32', text: 'اوفر جار كلوب هاوس الشويخ', status: 'new' },
    { id: 'i33', text: 'المطلاع', status: 'new' },
    { id: 'i34', text: 'الرابية', status: 'new' },
    { id: 'i35', text: 'الإنتاج - التوريد - التركيب', status: 'new' },
    { id: 'i36', text: 'قرطبة', status: 'new' },
    { id: 'i37', text: 'اليرموك', status: 'new' },
    { id: 'i38', text: 'وقت الايفنتات', status: 'new' },
    { id: 'i39', text: 'المطلاع', status: 'new' },
    { id: 'i40', text: 'مصنع البولي ايثيلين', status: 'new' },
  ]},
];

let sections = [];
let collapsedIds = {};
let saveTimer = null;
let toastTimer = null;

function uid(prefix) {
  return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// تعديل دالة الحفظ السحابي بدقة متناهية لمنع فقدان البيانات أثناء الكتابة
function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  showSaving();
  saveTimer = setTimeout(async () => {
    try {
      await db.collection("boards").doc(STORAGE_KEY).set({
        data: JSON.stringify(sections),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast('تم الحفظ سحابياً ✓');
    } catch (e) {
      showToast('خطأ في الحفظ السحابي، تحقق من الاتصال');
    }
  }, 500);
}

function showSaving() {
  const toast = document.getElementById('saveToast');
  toast.textContent = 'جارِ الحفظ سحابياً...';
  toast.classList.add('show');
}

function showToast(msg) {
  const toast = document.getElementById('saveToast');
  toast.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
}

function svgDonut(total, done, progress) {
  const size = 46, stroke = 5, r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const doneFrac = total ? done / total : 0;
  const progFrac = total ? progress / total : 0;
  const doneLen = c * doneFrac;
  const progLen = c * progFrac;
  let inner = `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="${stroke}" />`;
  if (total > 0) {
    inner += `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${STATUS_COLOR.done}" stroke-width="${stroke}"
      stroke-dasharray="${doneLen} ${c - doneLen}" stroke-dashoffset="${c * 0.25}"
      stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})" />`;
    inner += `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${STATUS_COLOR.progress}" stroke-width="${stroke}"
      stroke-dasharray="${progLen} ${c - progLen}" stroke-dashoffset="${c * 0.25 - doneLen}"
      stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})" />`;
  }
  inner += `<text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="800" fill="#EDEFFA">${total}</text>`;
  return `<svg class="donut" viewBox="0 0 ${size} ${size}">${inner}</svg>`;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function render() {
  renderGlobalStats();
  renderGrid();
}

function renderGlobalStats() {
  const totalAll = sections.reduce((a, s) => a + s.items.length, 0);
  const doneAll = sections.reduce((a, s) => a + s.items.filter(i => i.status === 'done').length, 0);
  const progAll = sections.reduce((a, s) => a + s.items.filter(i => i.status === 'progress').length, 0);
  document.getElementById('globalStats').innerHTML = `
    <div class="stat-pill total"><span class="num">${totalAll}</span><span class="lbl">الإجمالي</span></div>
    <div class="stat-pill progress"><span class="num">${progAll}</span><span class="lbl">قيد التنفيذ</span></div>
    <div class="stat-pill done"><span class="num">${doneAll}</span><span class="lbl">منتهي</span></div>
  `;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  sections.forEach(section => {
    grid.appendChild(buildCard(section));
  });
}

function buildCard(section) {
  const total = section.items.length;
  const done = section.items.filter(i => i.status === 'done').length;
  const progress = section.items.filter(i => i.status === 'progress').length;
  const newCount = total - done - progress;
  const collapsed = !!collapsedIds[section.id];

  const card = document.createElement('div');
  card.className = 'card' + (collapsed ? ' collapsed' : '');
  card.dataset.sectionId = section.id;

  const head = document.createElement('div');
  head.className = 'card-head';
  head.innerHTML = `
    ${svgDonut(total, done, progress)}
    <div class="card-head-text">
      <h2>${escapeHtml(section.title)}</h2>
      <div class="meta">${done} منتهي · ${progress} قيد التنفيذ · ${newCount} جديد</div>
    </div>
    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  `;
  head.addEventListener('click', () => {
    collapsedIds[section.id] = !collapsedIds[section.id];
    render();
  });
  card.appendChild(head);

  const body = document.createElement('div');
  body.className = 'card-body';

  if (section.items.length === 0) {
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.textContent = 'لا توجد بنود بعد — أضف أول بند بالأسفل';
    body.appendChild(hint);
  }

  section.items.forEach(item => {
    body.appendChild(buildItemRow(section, item));
  });

  const addRow = document.createElement('div');
  addRow.className = 'add-row';
  const input = document.createElement('input');
  input.placeholder = 'إضافة بند جديد...';
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addBtn.click();
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-btn';
  addBtn.textContent = '+';
  addBtn.addEventListener('click', () => {
    const text = input.value.trim();
    if (!text) return;
    section.items.push({ id: uid('i'), text, status: 'new' });
    scheduleSave();
    render();
  });
  addRow.appendChild(input);
  addRow.appendChild(addBtn);
  body.appendChild(addRow);

  card.appendChild(body);
  return card;
}

function buildItemRow(section, item) {
  const row = document.createElement('div');
  row.className = `item-row status-${item.status}${item.urgent ? ' is-urgent' : ''}`;

  const dot = document.createElement('button');
  dot.className = 'status-dot';
  dot.style.background = STATUS_COLOR[item.status];
  dot.title = 'تغيير الحالة';
  dot.addEventListener('click', () => cycleStatus(section, item));

  const textInput = document.createElement('input');
  textInput.className = 'item-text';
  textInput.value = item.text;
  textInput.placeholder = 'بند بدون عنوان';
  textInput.addEventListener('input', (e) => {
    item.text = e.target.value;
    scheduleSave();
  });

  const badge = document.createElement('button');
  badge.className = `status-badge ${item.status}`;
  badge.textContent = STATUS_LABEL[item.status];
  badge.addEventListener('click', () => cycleStatus(section, item));

  const urgentBtn = document.createElement('button');
  urgentBtn.className = 'urgent-btn' + (item.urgent ? ' is-urgent' : '');
  urgentBtn.title = item.urgent ? 'عاجل جداً — اضغط للتحويل لعادي' : 'عادي — اضغط لتحديده عاجل';
  urgentBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="${item.urgent ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
    <path d="M12 2C9 6 6 9 6 13a6 6 0 0012 0c0-2-1-3.5-2-5 .3 1.5-.3 2.5-1 3 .3-3-1-5.5-3-9z" stroke-linecap="round" stroke-linejoin="round" /></svg>`;
  urgentBtn.addEventListener('click', () => {
    item.urgent = !item.urgent;
    scheduleSave();
    render();
  });

  const noteBtn = document.createElement('button');
  noteBtn.className = 'note-btn' + (item.note && item.note.trim() ? ' has-note' : '');
  noteBtn.title = item.note && item.note.trim() ? 'عرض/تعديل الملاحظة' : 'إضافة ملاحظة';
  noteBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M4 4h16v12H9l-5 4V4z" stroke-linecap="round" stroke-linejoin="round" /></svg>`;
  noteBtn.addEventListener('click', () => openNotePopover(section, item, noteBtn));

  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.title = 'حذف';
  delBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
    <path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2m2 0l-1 14a1 1 0 01-1 1H7a1 1 0 01-1-1L5 6h14z" stroke-linecap="round" stroke-linejoin="round" /></svg>`;
  delBtn.addEventListener('click', () => {
    section.items = section.items.filter(it => it.id !== item.id);
    scheduleSave();
    render();
  });

  row.appendChild(dot);
  row.appendChild(textInput);
  row.appendChild(urgentBtn);
  row.appendChild(noteBtn);
  row.appendChild(badge);
  row.appendChild(delBtn);
  return row;
}

function closeAnyOpenPopover() {
  const existing = document.querySelector('.note-popover');
  if (existing) existing.remove();
}

function openNotePopover(section, item, anchorBtn) {
  const already = document.querySelector('.note-popover');
  const wasOpenForThis = already && already.dataset.itemId === item.id;
  closeAnyOpenPopover();
  if (wasOpenForThis) return;

  const pop = document.createElement('div');
  pop.className = 'note-popover';
  pop.dataset.itemId = item.id;

  const textarea = document.createElement('textarea');
  textarea.className = 'note-textarea';
  textarea.placeholder = 'اكتب ملاحظتك هنا...';
  textarea.value = item.note || '';

  const actions = document.createElement('div');
  actions.className = 'note-actions';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'note-save-btn';
  saveBtn.textContent = 'حفظ';
  saveBtn.addEventListener('click', () => {
    item.note = textarea.value;
    scheduleSave();
    closeAnyOpenPopover();
    render();
  });

  const clearBtn = document.createElement('button');
  clearBtn.className = 'note-clear-btn';
  clearBtn.textContent = 'مسح الملاحظة';
  clearBtn.addEventListener('click', () => {
    item.note = '';
    scheduleSave();
    closeAnyOpenPopover();
    render();
  });

  actions.appendChild(saveBtn);
  actions.appendChild(clearBtn);
  pop.appendChild(textarea);
  pop.appendChild(actions);

  anchorBtn.parentElement.style.position = 'relative';
  anchorBtn.parentElement.appendChild(pop);
  textarea.focus();

  setTimeout(() => {
    document.addEventListener('click', function onOutside(e) {
      if (!pop.contains(e.target) && e.target !== anchorBtn) {
        closeAnyOpenPopover();
        document.removeEventListener('click', onOutside);
      }
    });
  }, 0);
}

function cycleStatus(section, item) {
  const idx = STATUS_CYCLE.indexOf(item.status);
  item.status = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  scheduleSave();
  render();
}

document.getElementById('resetBtn').addEventListener('click', async () => {
  if (!confirm('سيتم حذف كل البيانات السحابية الحالية والرجوع للوضع الافتراضي الأول. متأكد؟')) return;
  sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
  collapsedIds = {};
  scheduleSave();
  render();
});

function init() {
  const app = document.getElementById('app');
  const loadingScreen = document.getElementById('loadingScreen');

  // الاستماع لقاعدة البيانات السحابية بشكل حي ومباشر (Realtime Synchronization)
  db.collection("boards").doc(STORAGE_KEY).onSnapshot((doc) => {
    if (doc.exists && doc.data().data) {
      // جلب البيانات الجديدة المحدثة فقط في حالة لم يكن المستخدم يقوم بالكتابة حالياً لمنع تداخل الأحرف
      if (!saveTimer) {
        sections = JSON.parse(doc.data().data);
      }
    } else {
      // في حال كانت قاعدة البيانات فارغة تماماً (أول تشغيل)
      sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
      db.collection("boards").doc(STORAGE_KEY).set({ data: JSON.stringify(sections) });
    }
    
    app.classList.remove('is-loading');
    loadingScreen.style.display = 'none';
    render();
  }, (error) => {
    showToast('خطأ في الاتصال السحابي: تأكد من ضبط قواعد الـ Rules في فيربيز على وضع الـ Test Mode');
  });
}

init();
</script>
</body>
